<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop - Forum</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
      }
      nav {
        margin-bottom: 20px;
      }
      nav a {
        margin-right: 15px;
        text-decoration: none;
        color: #333;
      }
      nav a:hover {
        text-decoration: underline;
      }
      .product-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }
      .product-card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px;
        text-align: center;
      }
      .product-card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 4px;
        background-color: #eee;
      }
      .product-card h3 {
        margin: 10px 0 5px;
      }
      .product-card .price {
        color: #e44;
        font-weight: bold;
        font-size: 1.1em;
      }
      .product-card button {
        margin-top: 10px;
        padding: 8px 16px;
        background-color: #333;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .product-card button:hover {
        background-color: #555;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/">Home</a>
      <a href="/shop">Shop</a>
    </nav>

    <h1>Shop</h1>
    <p>Browse our products below.</p>

    <div class="product-grid">
      <div class="product-card">
        <img src="/images/product1.svg" alt="Product 1" />
        <h3>Product 1</h3>
        <p>A great product for everyday use.</p>
        <div class="price">$19.99</div>
        <button>Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="/images/product2.svg" alt="Product 2" />
        <h3>Product 2</h3>
        <p>High quality and durable.</p>
        <div class="price">$34.99</div>
        <button>Add to Cart</button>
      </div>
      <div class="product-card">
        <img src="/images/product3.svg" alt="Product 3" />
        <h3>Product 3</h3>
        <p>Best value for your money.</p>
        <div class="price">$9.99</div>
        <button>Add to Cart</button>
      </div>
    </div>
  </body>
</html>
